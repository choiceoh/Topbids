services:
  db:
    image: postgres:16-alpine
    container_name: topbid-db
    environment:
      POSTGRES_USER: topbid
      POSTGRES_PASSWORD: ${DB_PASSWORD:-topbid}
      POSTGRES_DB: topbid
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topbid"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: topbid-app
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://topbid:${DB_PASSWORD:-topbid}@db:5432/topbid?sslmode=disable
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      JWT_SECRET: ${JWT_SECRET:-topbid-dev-secret}
      ADDR: ":8081"
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:8000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Waiting for first backup schedule..."
        while true; do
          echo "[backup] Starting scheduled backup at $$(date -u +%H:%M:%S)"
          /scripts/backup-db.sh
          echo "[backup] Next backup in $${BACKUP_INTERVAL_HOURS:-24}h"
          sleep $$(( $${BACKUP_INTERVAL_HOURS:-24} * 3600 ))
        done
    volumes:
      - ./scripts:/scripts:ro
    environment:
      DATABASE_URL: postgres://topbid:${DB_PASSWORD:-topbid}@db:5432/topbid?sslmode=disable
      DROPBOX_REFRESH_TOKEN: ${DROPBOX_REFRESH_TOKEN:-}
      DROPBOX_APP_KEY: ${DROPBOX_APP_KEY:-}
      DROPBOX_APP_SECRET: ${DROPBOX_APP_SECRET:-}
      DROPBOX_BACKUP_PATH: ${DROPBOX_BACKUP_PATH:-/topbid-backups}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-30}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - backup

volumes:
  pgdata:
    name: topbid_pgdata
